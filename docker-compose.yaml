version: '3.8'

services:
  usermanagement-application:
    container_name: usermanagement-application
    image: usermanagement-application-image:latest
    ports:
      - "8082:8081"
    depends_on:
      - mysql-db
    networks:
      - user-network

  mysql-db:
    container_name: mysql-db
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: Root@123
      MYSQL_DATABASE: userdb
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - user-network

networks:
  user-network:
    name: user-network

volumes:
  mysql-data:
    name: mysql-data     
